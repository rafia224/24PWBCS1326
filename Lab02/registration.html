<h1>Student Registration Form</h1>

<form>

    <label>Name:</label><br>
    <input type="text" name="name"><br><br>

    <label>Registration Number:</label><br>
    <input type="text" name="regno"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email"><br><br>

    <label>Password:</label><br>
    <input type="password" name="password"><br><br>

    <label>Select Course:</label><br>
    <select name="course">
        <option>Web Technologies</option>
        <option>Automata</option>
        <option>Data Structures</option>
        <option>COAL</option>
    </select><br><br>

    <label>Semester:</label><br>
    <input type="radio" name="semester" value="1"> 1
    <input type="radio" name="semester" value="2"> 2
    <input type="radio" name="semester" value="3"> 3<br><br>

    <input type="checkbox" name="terms">
    I agree to the terms and conditions<br><br>

    <input type="submit" value="Register">

</form>

<br>
